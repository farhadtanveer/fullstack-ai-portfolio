name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint & Format Check ───────────────────────────────────────────
  lint:
    name: Lint (Ruff + Black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install black ruff

      - name: Check formatting (Black)
        run: black --check .

      - name: Check linting (Ruff)
        run: ruff check .

  # ─── Run Tests for Each Project ────────────────────────────────────
  test-project-01:
    name: Test — 01 FastAPI Basics
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: projects/01-fastapi-basics
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: projects/01-fastapi-basics
        run: pytest tests/ -v

  test-project-03:
    name: Test — 03 AI Sentiment API
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: projects/03-ai-sentiment
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: projects/03-ai-sentiment
        run: pytest tests/ -v
